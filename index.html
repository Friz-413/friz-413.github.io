<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FRIZ — Developer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }
    .container { max-width: 640px; width: 100%; }
    header { margin-bottom: 48px; }
    h1 { font-size: 2.5rem; font-weight: 800; color: #f0f6fc; }
    p.tagline { color: #8b949e; margin-top: 4px; font-size: 1.1rem; }
    .links { margin-top: 16px; display: flex; gap: 16px; }
    .links a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .links a:hover { text-decoration: underline; }
    h2 { font-size: 1.3rem; font-weight: 600; color: #f0f6fc; margin-bottom: 16px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #58a6ff; }
    .card h3 { font-size: 1.2rem; color: #f0f6fc; }
    .card p { color: #8b949e; margin-top: 8px; line-height: 1.5; }
    .card a {
      display: inline-block;
      margin-top: 12px;
      color: #58a6ff;
      text-decoration: none;
      font-weight: 500;
    }
    .card a:hover { text-decoration: underline; }
    footer { margin-top: 64px; color: #484f58; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>FRIZ</h1>
      <p class="tagline">Android Developer</p>
      <div class="links">
        <a href="https://github.com/friz-413">GitHub</a>
      </div>
    </header>
    <main>
      <h2>Projects</h2>
      <div class="card">
        <h3>Focus Diary</h3>
        <p>
          Minimalist diary app for Android. Track goals, milestones, streaks,
          and daily progress. Built with Jetpack Compose.
        </p>
        <a href="https://github.com/friz-413/Focus">View on Google Play →</a>
      </div>
    </main>
    <footer>
      <p>© 2026 FRIZ</p>
    </footer>
  </div>
</body>
</html>
